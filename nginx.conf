server {
    listen 8080;
    server_name localhost;

    # Docker's internal DNS nameserver IP
    resolver 127.0.0.11 valid=30s;

    # Serve static frontend assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Prevents boot-time crashes
    location /api/node/ {
        set $upstream_node http://api-node:3000;
        proxy_pass $upstream_node;
    }

    # Same but for Go GraphQL API
    location /graphql {
        set $upstream_go http://api-golang:8080;
        proxy_pass $upstream_go;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}